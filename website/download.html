<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="robots" content="noindex" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#06080f" />
    <title>Download Reelattice</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/32x32.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;800&family=Rajdhani:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #06080f;
        --cyan: #00f0ff;
        --font-display: "Orbitron", system-ui, sans-serif;
        --font-body: "Rajdhani", system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: max(1.5rem, env(safe-area-inset-top, 0px)) max(1.5rem, env(safe-area-inset-right, 0px))
          max(1.5rem, env(safe-area-inset-bottom, 0px)) max(1.5rem, env(safe-area-inset-left, 0px));
        font-family: var(--font-body);
        font-size: 1rem;
        background: var(--bg);
        color: #e2e8f0;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(0, 240, 255, 0.08), transparent);
        pointer-events: none;
      }

      main {
        width: 100%;
        max-width: 22rem;
        border: 1px solid rgba(0, 240, 255, 0.25);
        background: rgba(10, 14, 23, 0.92);
        padding: 2rem 1.5rem;
        text-align: center;
        box-shadow: 0 0 30px rgba(0, 240, 255, 0.08);
      }

      .pulse {
        width: 0.65rem;
        height: 0.65rem;
        margin: 0 auto 1.25rem;
        border-radius: 9999px;
        background: var(--cyan);
        box-shadow: 0 0 12px rgba(0, 240, 255, 0.5);
        animation: pulse 1.2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.35;
          transform: scale(0.85);
        }
      }

      h1 {
        margin: 0 0 0.75rem;
        font-family: var(--font-display);
        font-size: 0.875rem;
        font-weight: 800;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--cyan);
      }

      p {
        margin: 0;
        color: #94a3b8;
        font-size: 0.9375rem;
        line-height: 1.55;
      }

      .links {
        margin-top: 1.25rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        align-items: center;
      }

      a {
        color: #22d3ee;
        font-family: var(--font-display);
        font-size: 0.625rem;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        text-decoration: none;
      }

      a:hover {
        color: #67e8f9;
      }

      a.primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.75rem;
        width: 100%;
        border: 1px solid rgba(0, 240, 255, 0.5);
        background: rgba(0, 240, 255, 0.08);
        padding: 0.75rem 1rem;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="pulse" aria-hidden="true"></div>
      <h1>Preparing Download</h1>
      <p id="status">Fetching the latest Windows installer…</p>
      <div id="fallback" class="links" hidden>
        <a id="github-link" class="primary" href="https://github.com/OfirPatish/Reelattice/releases/latest">
          Download from GitHub
        </a>
        <a id="home-link" href="/">Return to home</a>
      </div>
    </main>
    <script>
      const releasesLatestApi = "__RELEASES_LATEST_API__";
      const githubReleases = "https://github.com/OfirPatish/Reelattice/releases/latest";
      const status = document.getElementById("status");
      const fallback = document.getElementById("fallback");

      const showError = (message) => {
        status.textContent = message;
        fallback.hidden = false;
      };

      fetch(releasesLatestApi, {
        headers: { Accept: "application/json" },
      })
        .then((response) => {
          if (!response.ok) throw new Error("Release lookup failed");
          return response.json();
        })
        .then((release) => {
          const asset =
            release.assets?.find((item) => /-setup\.exe$/i.test(item.name)) ??
            release.assets?.find((item) => /\.exe$/i.test(item.name));

          if (!asset?.browser_download_url) {
            throw new Error("Installer not found");
          }

          status.textContent = "Starting download…";
          window.location.replace(asset.browser_download_url);
        })
        .catch(() => {
          showError("Could not start the download automatically. Use GitHub or return home.");
        });
    </script>
  </body>
</html>
