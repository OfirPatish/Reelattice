<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#06080f" />
    <title>Download Reelattice</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/32x32.png" />
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, sans-serif;
        background: #06080f;
        color: #e2e8f0;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }
      main {
        max-width: 22rem;
        text-align: center;
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.125rem;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      p {
        margin: 0;
        color: #94a3b8;
        font-size: 0.9375rem;
        line-height: 1.5;
      }
      a {
        color: #22d3ee;
      }
      .pulse {
        width: 0.65rem;
        height: 0.65rem;
        margin: 0 auto 1rem;
        border-radius: 9999px;
        background: #22d3ee;
        animation: pulse 1.2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.35;
          transform: scale(0.85);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="pulse" aria-hidden="true"></div>
      <h1>Preparing download</h1>
      <p id="status">Fetching the latest Windows installer…</p>
      <p id="fallback" hidden style="margin-top: 1rem">
        <a id="manual-link" href="/">Return to home</a>
      </p>
    </main>
    <script>
      const releasesLatestApi = "__RELEASES_LATEST_API__";
      const status = document.getElementById("status");
      const fallback = document.getElementById("fallback");
      const manualLink = document.getElementById("manual-link");

      const showError = (message) => {
        status.textContent = message;
        fallback.hidden = false;
        manualLink.textContent = "Return to home";
        manualLink.href = "/";
      };

      fetch(releasesLatestApi, {
        headers: { Accept: "application/json" },
      })
        .then((response) => {
          if (!response.ok) throw new Error("Release lookup failed");
          return response.json();
        })
        .then((release) => {
          const asset =
            release.assets?.find((item) => /-setup\.exe$/i.test(item.name)) ??
            release.assets?.find((item) => /\.exe$/i.test(item.name));

          if (!asset?.browser_download_url) {
            throw new Error("Installer not found");
          }

          status.textContent = "Starting download…";
          window.location.replace(asset.browser_download_url);
        })
        .catch(() => {
          showError("Could not start the download automatically.");
        });
    </script>
  </body>
</html>
