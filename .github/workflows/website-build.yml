name: Website build

on:
  push:
    branches:
      - main
    paths:
      - "website/**"
      - ".github/workflows/website-build.yml"
  pull_request:
    paths:
      - "website/**"
      - ".github/workflows/website-build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build
        working-directory: website
        env:
          VITE_SITE_URL: https://reelattice.vercel.app
        run: npm run build
